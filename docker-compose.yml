version: "3.9"

services:
  hookpad:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - hookpad_data:/data
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin-mude-isso}
      - BASE_URL=${BASE_URL:-http://localhost:8000}
      - EXEC_TIMEOUT=${EXEC_TIMEOUT:-30}
      - MAX_WORKERS=${MAX_WORKERS:-4}
      - SANDBOX_MEM_MB=${SANDBOX_MEM_MB:-512}
      - SANDBOX_CPU_SEC=${SANDBOX_CPU_SEC:-60}
      - MAX_BODY_BYTES=${MAX_BODY_BYTES:-10485760}
      - MAX_RESPONSE_BYTES=${MAX_RESPONSE_BYTES:-10485760}
      - MAX_LOG_BYTES=${MAX_LOG_BYTES:-524288}
    restart: unless-stopped

volumes:
  hookpad_data:
